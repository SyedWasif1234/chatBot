services:
  - type: web
    name: esp32-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn telegram_bot:flask_app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: ESP32_URL
        sync: false          # e.g. https://xxxx.trycloudflare.com
      - key: WEBHOOK_URL
        sync: false          # e.g. https://esp32-telegram-bot.onrender.com
